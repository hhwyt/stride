name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Configure git (used by the engine and integration tests)
        run: |
          git config --global user.email ci@stride.test
          git config --global user.name stride-ci
          git config --global init.defaultBranch main
      - run: npm ci
      - run: npm run build
      - run: npm test
